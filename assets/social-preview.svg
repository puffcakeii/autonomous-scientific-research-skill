<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">自动化科研 Skill</title>
  <desc id="desc">Codex 自动化科研流程控制器，强调文献路线、实验注册表、claim ledger 和泄漏审计。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.56" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#0d3b3e"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.52" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#facc15"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <g opacity="0.16" stroke="#94a3b8" stroke-width="1">
