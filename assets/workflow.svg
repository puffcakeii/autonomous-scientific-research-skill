<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="360" viewBox="0 0 1400 360" role="img" aria-labelledby="title desc">
  <title id="title">Stage 0-4 自动化科研工作流</title>
  <desc id="desc">从问题定义、文献路线、方案细化、实验循环到最终验证的流程图。</desc>
  <defs>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.5" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1400" height="360" rx="28" fill="#f8fafc"/>
  <path d="M150 176 H1250" stroke="url(#line)" stroke-width="10" stroke-linecap="round"/>
  <g font-family="Segoe UI, Arial, sans-serif">
    <g transform="translate(70 92)" filter="url(#shadow)">
      <rect width="220" height="168" rx="22" fill="#ffffff"/>
      <text x="28" y="48" font-size="22" font-weight="800" fill="#0369a1">Stage 0</text>
      <text x="28" y="86" font-size="26" font-weight="800" fill="#0f172a">问题定义</text>
      <text x="28" y="122" font-size="18" fill="#475569">真实数据源 gate</text>
    </g>
    <g transform="translate(340 92)" filter="url(#shadow)">
      <rect width="220" height="168" rx="22" fill="#ffffff"/>
      <text x="28" y="48" font-size="22" font-weight="800" fill="#047857">Stage 1</text>
      <text x="28" y="86" font-size="26" font-weight="800" fill="#0f172a">文献路线</text>
      <text x="28" y="122" font-size="18" fill="#475569">3-5 条候选方案</text>
    </g>
    <g transform="translate(610 92)" filter="url(#shadow)">
      <rect width="220" height="168" rx="22" fill="#ffffff"/>
      <text x="28" y="48" font-size="22" font-weight="800" fill="#7c3aed">Stage 2</text>
      <text x="28" y="86" font-size="26" font-weight="800" fill="#0f172a">最佳方案</text>
      <text x="28" y="122" font-size="18" fill="#475569">指标与 baseline</text>
    </g>
    <g transform="translate(880 92)" filter="url(#shadow)">
      <rect width="220" height="168" rx="22" fill="#ffffff"/>
      <text x="28" y="48" font-size="22" font-weight="800" fill="#b45309">Stage 3</text>
      <text x="28" y="86" font-size="26" font-weight="800" fill="#0f172a">实验循环</text>
      <text x="28" y="122" font-size="18" fill="#475569">keep / discard</text>
    </g>
    <g transform="translate(1150 92)" filter="url(#shadow)">
      <rect width="220" height="168" rx="22" fill="#ffffff"/>
      <text x="28" y="48" font-size="22" font-weight="800" fill="#be123c">Stage 4</text>
      <text x="28" y="86" font-size="26" font-weight="800" fill="#0f172a">验证交付</text>
      <text x="28" y="122" font-size="18" fill="#475569">claim ledger 审核</text>
    </g>
  </g>
</svg>
