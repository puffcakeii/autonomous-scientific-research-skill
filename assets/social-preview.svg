  <rect x="72" y="78" width="1136" height="484" rx="36" fill="#f8fafc" filter="url(#softShadow)"/>
  <rect x="72" y="78" width="1136" height="10" fill="url(#line)"/>
  <text x="118" y="158" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#0f766e">CODEX SKILL</text>
  <text x="118" y="250" font-family="Segoe UI, Arial, sans-serif" font-size="72" font-weight="850" fill="#0f172a">自动化科研流程控制器</text>
  <text x="122" y="314" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#334155">从文献路线到实验注册表，从 Claim Ledger 到泄漏审计</text>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">
